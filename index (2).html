       /* Police du texte en dessous des polaroïde */
       @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

       body {
            margin: 0;

       .container {

        #message-final {

     /* --- LE CSS DE LA ZONE DE STICKERS --- */

/* --- LE NOUVEAU CSS POUR TOUT RELEVER ET CADRE TRANSPARENT --- */

.container {
    position: relative; /* Indispensable pour placer les stickers */
}

/* Base pour tous les stickers */
.sticker {
    position: absolute;
    font-size: 30px; /* Légèrement plus gros pour un effet plus festif */
    user-select: none;
    z-index: 1; /* Derrière la photo et le texte */
    animation: flotter 4s ease-in-out infinite; /* Animation de flottement */
}

/* Le conteneur global pour relever TOUS les stickers */
#zone-stickers {
    position: absolute;
    top: -50px; /* On remonte tout le bloc ! (ajuste si nécessaire) */
    left: 0;
    width: 100%;
    height: 100%;
}

/* Positions pour le CÔTÉ GAUCHE (sl) - Mieux réparties en hauteur */
.sl1 { left: 5%; top: 40%; animation-delay: 0s; font-size: 32px; }
.sl2 { left: 15%; top: 35%; animation-delay: 0.5s; }
.sl3 { left: 8%; top: 50%; animation-delay: 1s; }
.sl4 { left: 18%; top: 55%; animation-delay: 1.5s; font-size: 34px; }
.sl5 { left: 10%; top: 65%; animation-delay: 2s; }
.sl6 { left: 20%; top: 70%; animation-delay: 2.5s; }
.sl7 { left: 5%; top: 75%; animation-delay: 3s; font-size: 30px; }
.sl8 { left: 15%; top: 80%; animation-delay: 3.5s; }
.sl9 { left: 22%; top: 42%; animation-delay: 0.8s; }
.sl10 { left: 12%; top: 48%; animation-delay: 1.3s; font-size: 32px; }

/* Positions pour le CÔTÉ DROIT (sr) - Mieux réparties en hauteur */
.sr1 { right: 5%; top: 38%; animation-delay: 0.2s; font-size: 32px; }
.sr2 { right: 15%; top: 43%; animation-delay: 0.7s; }
.sr3 { right: 8%; top: 52%; animation-delay: 1.2s; }
.sr4 { right: 18%; top: 58%; animation-delay: 1.7s; font-size: 34px; }
.sr5 { right: 10%; top: 68%; animation-delay: 2.2s; }
.sr6 { right: 20%; top: 72%; animation-delay: 2.7s; }
.sr7 { right: 5%; top: 78%; animation-delay: 3.2s; }
.sr8 { right: 15%; top: 82%; animation-delay: 3.7s; font-size: 30px; }
.sr9 { right: 22%; top: 45%; animation-delay: 1.1s; }
.sr10 { right: 12%; top: 50%; animation-delay: 1.6s; font-size: 32px; }

/* --- CADRE PHOTO TRANSPARENT --- */
#maPhoto { /* Remplace ici par l'ID de ta photo si nécessaire */
    background-color: transparent !important; /* Force la transparence du fond */
    border: none !important; /* Enlève toute bordure */
    box-shadow: none !important; /* Enlève toute ombre */
    border-radius: 0; /* Enlève les coins arrondis */
}

/* Animation de flottement aléatoire */
@keyframes flotter {
    0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
    33% { transform: translateY(-10px) translateX(5px) rotate(5deg); }
    66% { transform: translateY(5px) translateX(-5px) rotate(-5deg); }
}





/* --- LE CHEMIN STYLE ROUTE --- */
#road-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1; /* Derrière les photos */
    pointer-events: none;
}

/* Dessin des deux routes (Gauche et Droite) */
.route-line {
    fill: none;
    stroke: #333; /* Couleur goudron */
    stroke-width: 25; /* Largeur de la route */
    stroke-dasharray: 10, 10; /* Pointillés blancs (simulés par le contour) */
    stroke-linecap: round;
    filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
}

/* Ajout d'une bordure blanche pour l'effet pointillés au milieu */
.route-inner {
    fill: none;
    stroke: white;
    stroke-width: 2;
    stroke-dasharray: 10, 15;
}

/* --- STYLE POLAROÏD --- */
.polaroid {
    position: absolute;
    width: 110px; /* Taille ajustée pour bien voir la route */
    background: white;
    padding: 8px 8px 25px 8px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    border: 1px solid #ddd;
    transition: all 0.3s ease;
    z-index: 10; /* Pour être bien AU-DESSUS de la route */
}

.polaroid img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    margin-top: 0 !important;
}



.polaroid:hover {
    transform: scale(1.2) rotate(0deg) !important;
    z-index: 100;
}


/* --- NOUVEAU STYLE POUR LES LÉGENDES DES POLAROÏDS --- */

/* Style du texte sous la photo */
.polaroid .caption {
    position: absolute;
    bottom: 2px; /* Pour remonter un peu le texte */
    left: 0;
    width: 100%;
    text-align: center;
    padding: 0 5px; /* Petit espacement sur les côtés */
    box-sizing: border-box; /* Pour que le padding ne casse pas la largeur */
    
    /* STYLE D'ÉCRITURE */
    font-family: 'Shadows Into Light', cursive; /* Police manuscrite pour l'effet Polaroïd */
    font-size: 20px; /* Taille du texte */
    color: #333; /* Couleur gris foncé, plus naturel que noir */
   font-weight: bold;
    
 /* GESTION DU TEXTE PAS COUPÉ */
    white-space: normal;   /* Permet au texte de passer à la ligne */
    overflow: visible;     /* Affiche tout le texte */
    line-height: 1.1;      /* Espace serré entre les lignes pour que ça tienne */
}


/* --- POSITIONNEMENT DES 7 ÉTAPES --- */
/* Gauche (Serpentin) */
/* --- PLACEMENT SUR LA ROUTE GAUCHE --- */

#pol2 { top: 24%;  left: -20vw; transform: rotate(4deg); }

/* Positionnement décoration autour des photos */

/* === LE CSS POUR LES DÉCORATIONS (À ajouter à la fin de ton <style>) === */

/* --- Style de base pour tous les objets déco --- */
.deco-item {
    position: absolute;
    z-index: 5; /* Au-dessus des routes (0) mais sous ton texte central (10) */
    pointer-events: none; /* Ne bloque pas le clic si on veut cliquer derrière */

}

/* Taille générale de tes petites décos */

    width: auto;
}

/* --- LES DIFFÉRENTES ANIMATIONS --- */

/* 1. Balancement lent (pour les bâtiments) */
@keyframes sway {
    0% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
    100% { transform: rotate(-3deg); }
}

/* 2. Petit saut joyeux (pour un poisson ou un objet fun) */
@keyframes jump {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px) scale(1.05); }
}

/* 3. Frétillement rapide (pour les poissons) */
@keyframes wiggle {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    75% { transform: rotate(-5deg); }
    100% { transform: rotate(0deg); }
}

/* 4. Respiration douce (effet de zoom) */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

/* --- ATTRIBUTION INDÉPENDANTE --- */

/* Côté Gauche */
#bateau { 
    animation: sway 4s ease-in-out infinite; 
    transform-origin: bottom center; 
}

#OM { 
    animation: pulse 2s ease-in-out infinite; 
}

#Manta { 
    animation: wiggle 0.8s ease-in-out infinite; 
}

/* Côté Droit */
#tour_eiffel { 
    animation: sway 5s ease-in-out infinite; 
}

@keyframes ski_descente {
    /* Point de départ : Haut du virage 1, légèrement incliné */
    0% { transform: translate(0, 0) rotate(5deg); }
    
    /* Milieu du premier virage : Il se déplace à droite et descend */
    25% { transform: translate(15px, 10px) rotate(-10deg); }
    
    /* Haut du virage 2 : Il revient au centre, mais plus bas */
    50% { transform: translate(0px, 20px) rotate(5deg); }
    
    /* Milieu du second virage : Il se déplace à gauche et descend */
    75% { transform: translate(-15px, 30px) rotate(-10deg); }
    
    /* Point d'arrivée : En bas, prêt à recommencer */
    100% { transform: translate(0, 40px) rotate(5deg); }
}

/* --- ATTRIBUTION SPÉCIFIQUE AU SKIEUR --- */

#Skieur { 
    /* Utilise l'animation que l'on vient de créer */
    animation: ski_descente 5s ease-in-out ; 
    
    /* IMPORTANT : Il faut que le skieur boucle sa descente.
       Le 'ease-in-out' rend le virage fluide,
       et le 'infinite' recommence l'action.
    */
}

#Matisse { 
    animation: pulse 3s ease-in-out infinite; 
    animation-delay: 0.5s; 
}

/* --- POSITIONNEMENT PRÉCIS CORRESPONDANT À TES RONDS ROUGES --- */

/* Côté Gauche */
#bateau { top: -5%; left: -17vw; animation-delay: 0.2s; } /* Rond du haut gauche */
#OM { top: 25%; left: -32vw; animation-delay: 0.5s; } /* Rond milieu gauche */
#Manta { top: 53%; left: -11.3vw; animation-delay: 0.8s; } /* Rond bas gauche */
#tour_eiffel { top: 75%; left: -33vw; animation-delay: 0.3s; } 

/* Côté Droit */

#Skieur { top: -5%; right: -15vw; animation-delay: 0.6s; } /* Rond milieu droit */
#Matisse { top: 45%; right: -30vw; animation-delay: 0.9s; } /* Rond bas droit */

/* --- PETITE CORRECTION DE PROPRETÉ --- */
/* Je vois que ton texte d'anniversaire est un peu tassé en haut,
   on va juste le descendre un petit peu pour la propreté. */
#container h1 {
    margin-top: 30px !important; /* Ajoute un peu d'espace au titre */
}

    <script>
        // COMPTEUR
       // --- 1. CONFIGURATION DU COMPTEUR ---
const startDate = new Date("May 5, 2004 00:00:00").getTime();

function updateTimer() {
    const now = new Date().getTime();
    const diff = now - startDate;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    if (document.getElementById("days")) {
        document.getElementById("days").innerText = d;
        document.getElementById("hours").innerText = h;
        document.getElementById("minutes").innerText = m;
        document.getElementById("seconds").innerText = s;
    }




    
}
setInterval(updateTimer, 1000);
updateTimer(); // Lancement immédiat

// --- 2. LOGIQUE DU BOUTON FUYARD ---
let clics = 0;
let modeFuyard = false;

function bougerBouton() {
    if (modeFuyard) return; // Bloque le clic pendant la phase de fuite auto

    clics++;

// --- NOUVEAU : LANCER LA MUSIQUE AU PREMIER CLIC ---
    if (clics === 1) {
        const musique = document.getElementById('musique-anniv');
        musique.play().catch(e => console.log("L'auto-play est bloqué par le navigateur"));
    }

    const btn = document.getElementById('btn-cadeau');
    const photo = document.querySelector('.photo-frame img');
    if (!photo) return;
    const photoRect = photo.getBoundingClientRect();

    if (clics < 5) {
        // --- TA LOGIQUE DE DÉPLACEMENT AU CLIC ---
        const rect = btn.getBoundingClientRect();
        const marge = 80;
        let newX, newY;
        let surPhoto = true;

        // --- REGLAGE DE LA TAILLE ---
        // Ici, tu choisis la taille pour chaque clic (clic 1, 2, 3, 4)
        // 1.0 = taille normale, 0.5 = moitié, 0.2 = minuscule
        const tailles = [0.9, 0.7, 0.5, 0.3]; 
        const nouvelleTaille = tailles[clics - 1];

        while (surPhoto) {
            const xMax = window.innerWidth - rect.width - marge;
            const yMax = window.innerHeight - rect.height - marge;
            newX = Math.floor(Math.random() * (xMax - marge)) + marge;
            newY = Math.floor(Math.random() * (yMax - marge)) + marge;

            const padding = 20;
            const horsZoneX = (newX + rect.width + padding < photoRect.left) || (newX - padding > photoRect.right);
            const horsZoneY = (newY + rect.height + padding < photoRect.top) || (newY - padding > photoRect.bottom);
            
            if (horsZoneX || horsZoneY) surPhoto = false;
        }

        btn.style.position = 'fixed';
        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
        btn.style.transform = `scale(${nouvelleTaille})`;
        btn.innerText = "Alors petite neuille ?";

    } else if (clics === 5) {
        // --- NOUVEAU : MODE FUITE À LA SOURIS (10 SECONDES) ---
        modeFuyard = true;
        btn.innerText = "Alors du galère";
        btn.style.backgroundColor = "#ff9800";
        btn.style.transform = "scale(1.1)";

        const fuyerSouris = (e) => {
            const r = btn.getBoundingClientRect();
            const dist = Math.sqrt(Math.pow(e.clientX - (r.left + r.width/2), 2) + Math.pow(e.clientY - (r.top + r.height/2), 2));

            if (dist < 180) { // Si la souris approche à moins de 180px
                // On réutilise ta logique de calcul aléatoire
                let nX = Math.floor(Math.random() * (window.innerWidth - r.width - 80)) + 80;
                let nY = Math.floor(Math.random() * (window.innerHeight - r.height - 80)) + 80;
                btn.style.left = nX + 'px';
                btn.style.top = nY + 'px';
            }
        };

        document.addEventListener('mousemove', fuyerSouris);

        // Arrêt après 10 secondes
        setTimeout(() => {
            document.removeEventListener('mousemove', fuyerSouris);
            modeFuyard = false;
            clics++; 
            
            // On passe au stade de la victoire
            // 1. On annule le mode 'fixed' pour qu'il revienne dans le flux du site
            btn.style.position = 'relative'; 
            
            // 2. On réinitialise les coordonnées forcées par le JS
            btn.style.left = 'auto';
            btn.style.top = 'auto';
            
            // 3. On remet les propriétés de centrage identiques au début
            btn.style.margin = '30px auto'; 
            btn.style.display = 'block';
            
            // 4. Style visuel final
            btn.style.backgroundColor = "#4CAF50";
            btn.innerText = "Bon ok... Joyeux Anniversaire mon coeur !";
            btn.style.transform = "scale(1)";
            
        }, 10000);

        
            

   } else {
        // --- CLIC FINAL APRÈS LES 10 SECONDES ---
        
        // 1. On récupère les deux sons
        const musiqueFond = document.getElementById('musique-anniv');
        const sonVictoire = document.getElementById('son-victoire');

        // 2. On arrête la musique de fond (et on la remet à zéro)
        musiqueFond.pause();
        musiqueFond.currentTime = 0; 

        // 3. On lance le son de victoire
        sonVictoire.play();

        // 4. On attend un peu avant de changer de page
        setTimeout(() => {
            window.open("page_cadeaux.html", "_blank");
        }, 800);
    }
       
}   
    </script>
</body>
</html>
